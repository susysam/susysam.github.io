<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404</title>

  <script>
    (function () {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark') document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
    })();
  </script>

  <style>
    :root{
      --bg: #f2f2f2;
      --text: #14161a;
      --card: rgba(255,255,255,.92);
      --border: rgba(0,0,0,.10);
      --shadow: 0 18px 45px rgba(0,0,0,.12);
      --accent: #6C0BA9;
      --accent-hover: #4F0672;
      --danger: #ff6347;
      --muted: rgba(20,22,26,.65);
      --overlay: rgba(255,255,255,0);
    }
    :root.dark{
      --bg: #0f1116;
      --text: #f2f4f8;
      --card: rgba(25,28,36,.75);
      --border: rgba(255,255,255,.12);
      --shadow: 0 18px 55px rgba(0,0,0,.55);
      --muted: rgba(242,244,248,.70);
      --overlay: rgba(0,0,0,.45);
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
      transition: background-color .25s ease, color .25s ease;
    }

    body::before{
      content:"";
      position: fixed;
      inset: 0;
      background: var(--overlay);
      pointer-events:none;
      z-index: 0;
    }
    body > *{ position: relative; z-index: 1; }

    .container {
      max-width: 480px;
      width: 100%;
      padding: 32px 24px;
      margin: 0 16px;
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }
    .container:hover {
      transform: translateY(-4px);
    }

    h1 {
      color: var(--danger);
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 32px;
      font-weight: 800;
    }

    p {
      margin-bottom: 24px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 15px;
    }

    .home-btn {
      display: inline-block;
      background-color: var(--accent);
      color: white;
      text-decoration: none;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 50px;
      transition: background-color 0.2s element, transform 0.2s ease;
    }
    .home-btn:hover {
      background-color: var(--accent-hover);
      transform: scale(1.03);
    }
    .home-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>The page you're looking for does not exist or has been relocated.</p>
    <a href="https://susysam.github.io/start27.html" class="home-btn">Return Home</a>
  </div>
</body>
</html>
