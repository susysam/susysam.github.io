<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Hub</title>

<script>
(function(){
  const theme = localStorage.getItem("theme");
  if(theme === "dark"){
    document.documentElement.classList.add("dark");
  }
})();
</script>

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg1:#f4f6fb;
--bg2:#e9ecf6;
--text:#14161a;
--accent:#6C0BA9;
--accent2:#3E0F87;
--panel:rgba(255,255,255,.8);
--border:rgba(0,0,0,.12);
}

:root.dark{
--bg1:#0f0f0f;
--bg2:#1a1a1a;
--text:#ffffff;
--panel:rgba(25,28,36,.72);
--border:rgba(255,255,255,.1);
}

body{
font-family:'Rubik',sans-serif;
margin:0;
min-height:100vh;
background:linear-gradient(145deg,var(--bg1),var(--bg2));
color:var(--text);
text-align:center;
}

header{
padding:25px;
font-size:28px;
font-weight:600;
background:linear-gradient(90deg,var(--accent),var(--accent2));
color:white;
}

.last-update{
margin-top:5px;
font-size:14px;
opacity:.7;
}

.container{
margin-top:30px;
}

.button{
padding:14px 28px;
margin:10px;
font-size:16px;
border-radius:12px;
border:2px solid var(--accent);
background:rgba(0,0,0,.08);
color:var(--text);
cursor:pointer;
transition:.25s;
}

.button:hover{
background:var(--accent);
color:white;
transform:scale(1.05);
}

.site-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
max-width:700px;
margin:40px auto;
}

.site{
padding:16px;
border-radius:10px;
background:var(--panel);
border:1px solid var(--border);
cursor:pointer;
transition:.2s;
}

.site:hover{
transform:translateY(-3px);
border-color:var(--accent);
}

</style>
</head>

<body>

<header>Link Hub</header>
<div class="last-update">Updated: 2026</div>

<div class="container">

<button class="button" onclick="randomSite()">Random Site</button>
<button class="button" onclick="goBack()">Back</button>

</div>

<div class="site-grid" id="sites"></div>

<script>

/* =========================
   ADD SITES HERE
   ========================= */

const sites = [

{name:"Google",url:"https://google.com"},
{name:"YouTube",url:"https://youtube.com"},
{name:"Reddit",url:"https://reddit.com"},
{name:"Wikipedia",url:"https://wikipedia.org"},
{name:"CoolMath",url:"https://coolmathgames.com"},
{name:"Chess",url:"https://chess.com"}

];


/* ========================= */

function openBlank(url){

const tab = window.open("about:blank","_blank");

tab.document.write(`
<html>
<head>
<title>Loading</title>
<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
}
iframe{
border:none;
width:100%;
height:100%;
}
</style>
</head>

<body>
<iframe src="${url}"></iframe>
</body>
</html>
`);

tab.document.close();

}

function loadSites(){

const grid = document.getElementById("sites");

sites.forEach(site=>{

const div=document.createElement("div");

div.className="site";
div.innerText=site.name;

div.onclick=()=>{
openBlank(site.url);
};

grid.appendChild(div);

});

}

function randomSite(){

const random = sites[Math.floor(Math.random()*sites.length)];
openBlank(random.url);

}

function goBack(){
window.location.href="start27.html";
}

loadSites();

</script>

</body>
</html>
