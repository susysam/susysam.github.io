<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workspace Screen</title>
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Google_Classroom_Logo.svg/2372px-Google_Classroom_Logo.svg.png" type="image/png"/>

  <script>
    (function () {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark') document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
    })();
  </script>

  <style>
    :root{
      --bg: #f4f7fc;
      --text: #14161a;
      --muted: rgba(20,22,26,.65);
      --border: rgba(0,0,0,.14);
      --card: rgba(255,255,255,.82);
      --overlay: rgba(255,255,255,0);
      --accent: #6C0BA9;
      --accent2: #4F0672;
      --danger: #FF5733;
      --danger2: #C74426;

      --laptopShell: #dcdde1;
      --laptopBezel: #1e272e;
    }
    :root.dark{
      --bg: #0f1116;
      --text: #f2f4f8;
      --muted: rgba(242,244,248,.68);
      --border: rgba(255,255,255,.14);
      --card: rgba(25,28,36,.72);
      --overlay: rgba(0,0,0,.45);

      --laptopShell: #2f3640;
      --laptopBezel: #0f1418;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
      position: relative;
      transition: background-color .25s ease, color .25s ease;
      overflow-x: hidden;
    }

    body::before{
      content:"";
      position: fixed;
      inset: 0;
      background: var(--overlay);
      pointer-events:none;
      z-index: 0;
    }
    body > *{ position: relative; z-index: 1; }

    /* Entry Animation Wrapper */
    .app-container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transform: translateY(20px);
      animation: laptopReveal 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes laptopReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    .back-button {
      padding: 10px 20px;
      background-color: var(--danger);
      color: white;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      margin-bottom: 20px;
      font-size: 15px;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    .back-button:hover { background-color: var(--danger2); }

    .search-bar {
      padding: 12px 16px;
      width: 100%;
      max-width: 550px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      outline: none;
      font-size: 15px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .search-bar:focus { border-color: var(--accent); }

    .button {
      padding: 10px 22px;
      background-color: var(--accent);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 25px;
      transition: background-color 0.2s;
    }
    .button:hover { background-color: var(--accent2); }

    /* Laptop Structure CSS */
    .laptop-hardware {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .laptop-screen-frame {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: var(--laptopBezel);
      border-radius: 16px 16px 0 0;
      padding: 20px 20px 24px 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      position: relative;
    }

    /* Inner Virtual Operating Display */
    .laptop-display-content {
      width: 100%;
      height: 100%;
      background: #111;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .virtual-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
      display: block;
    }

    /* Customized Internal Error Notification Module */
    .error-screen-overlay {
      position: absolute;
      inset: 0;
      background: #1e222b;
      color: #fff;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      z-index: 10;
    }

    .error-card {
      max-width: 420px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 24px;
      border-radius: 12px;
    }

    .error-title {
      font-size: 20px;
      color: #ff6b6b;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .error-action-btn {
      padding: 10px 20px;
      background: #ff5252;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .error-action-btn:hover { background: #ff3333; }

    /* Laptop Lower Keyboard Base Component */
    .laptop-base-chassis {
      width: 104%;
      height: 14px;
      background: var(--laptopShell);
      border-radius: 0 0 16px 16px;
      border-top: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 12px 25px rgba(0,0,0,0.2);
      position: relative;
    }

    .laptop-base-chassis::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 4px;
      background: rgba(0,0,0,0.15);
      border-radius: 0 0 4px 4px;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <button class="back-button" onclick="goBack()">Back</button>

    <input type="text" id="searchInput" class="search-bar" placeholder="Enter web URL (e.g., example.com)"
      onkeydown="if(event.key==='Enter') renderVirtualUrl()">

    <button class="button" onclick="renderVirtualUrl()">Open Site</button>

    <div class="laptop-hardware">
      <div class="laptop-screen-frame">
        
        <div class="laptop-display-content">
          
          <iframe src="about:blank" class="virtual-iframe" id="monitorIframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
          
          <div class="error-screen-overlay" id="errorModule">
            <div class="error-card">
              <div class="error-title">Error 404</div>
              <button class="error-action-btn" id="errorFallbackBtn">Open Tab</button>
            </div>
          </div>

        </div>

      </div>
      <div class="laptop-base-chassis"></div>
    </div>

  </div>

  <script>
    let confirmationTimer = null;
    let fallbackGlobalUrl = "";

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('searchInput').focus();
      // Set empty screen display baseline
      document.getElementById('monitorIframe').srcdoc = `
        <html style="height:100%; background:#141519;">
          <body style="margin:0;"></body>
        </html>`;
    });

    function sanitizeUrl(input) {
      input = input.trim();
      if (input.startsWith('http://') || input.startsWith('https://')) return input;
      return 'https://' + input;
    }

    function renderVirtualUrl() {
      const input = document.getElementById('searchInput').value.trim();
      const frameNode = document.getElementById('monitorIframe');
      const errorLayer = document.getElementById('errorModule');

      if (!input) return;
      
      const verifiedUrl = sanitizeUrl(input);
      fallbackGlobalUrl = verifiedUrl;
      
      // Reset displays cleanly
      errorLayer.style.display = "none";
      frameNode.removeAttribute('srcdoc');
      frameNode.src = verifiedUrl;

      if (confirmationTimer) clearTimeout(confirmationTimer);

      // Embedded Iframe connection confirmation timeout block
      confirmationTimer = setTimeout(() => {
        try {
          if (!frameNode.contentWindow || frameNode.contentWindow.location.href === "about:blank") {
            triggerErrorPanel();
          }
        } catch (err) {
          triggerErrorPanel();
        }
      }, 3500);
    }

    function triggerErrorPanel() {
      const errorLayer = document.getElementById('errorModule');
      errorLayer.style.display = "flex";
      
      document.getElementById('errorFallbackBtn').onclick = () => {
        window.open(fallbackGlobalUrl, '_blank');
      };
    }

    function goBack() {
      window.history.back();
    }
  </script>

  <script src="site-settings.js"></script>
</body>
</html>
