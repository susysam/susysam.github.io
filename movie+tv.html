<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Entertainment Player</title>

<style>
:root{
  --bg:#f3f3f3;
  --text:#333;
  --card:rgba(255,255,255,.92);
  --accent:#6C0BA9;
  --accent2:#4F0672;
  --danger:#ff3b3b;
  --border:rgba(0,0,0,.1);
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
  background:var(--card);
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
  text-align:center;
}

/* buttons */
.button{
  padding:12px 22px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:var(--accent);
  color:#fff;
  margin:6px;
  transition:.2s;
}
.button:hover{transform:scale(1.05);background:var(--accent2);}

.extra-panel{
  display:none;
  margin-top:20px;
  animation:fadeIn .3s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(-10px);}
  to{opacity:1; transform:translateY(0);}
}

.category{
  margin-top:15px;
  padding:10px;
  border:1px solid var(--border);
  border-radius:10px;
}

.site-btn{
  display:block;
  width:100%;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  background:#eee;
}

/* viewer */
.viewer{
  display:none;
  height:100vh;
  width:100%;
  position:fixed;
  top:0;
  left:0;
  background:#000;
  flex-direction:column;
}

.top-bar{
  display:flex;
  gap:10px;
  padding:10px;
  background:rgba(0,0,0,.85);
}

.top-bar button{
  padding:10px;
  border:none;
  cursor:pointer;
  border-radius:8px;
  color:#fff;
}

iframe{
  flex:1;
  width:100%;
  border:none;
}

.fallback{
  display:none;
  color:#fff;
  text-align:center;
  padding:20px;
}

/* reset */
.reset{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  background:var(--danger);
  color:#fff;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  display:none;
}
</style>
</head>

<body>

<div class="container" id="mainUI">

<h1>Entertainment Player</h1>

<button class="button" onclick="toggleExtra()">Extra’s</button>

<div class="extra-panel" id="extraPanel">

  <div class="category">
    <h3>Pstream Forks</h3>
    <button class="site-btn" onclick="openSite('https://aether.bar/')">aether.bar</button>
    <button class="site-btn" onclick="openSite('https://aether.cx/')">aether.cx</button>
    <button class="site-btn" onclick="openSite('https://zstream.mov/')">zstream.mov</button>
    <button class="site-btn" onclick="openSite('https://afterstream.org/')">afterstream</button>
    <button class="site-btn" onclick="openSite('https://basementx.xyz/')">basementx</button>
    <button class="site-btn" onclick="openSite('https://streamwatch.online/')">streamwatch</button>
    <button class="site-btn" onclick="openSite('https://pstream.site/')">pstream</button>
  </div>

  <div class="category">
    <h3>Everything Else</h3>
    <button class="site-btn" onclick="openSite('https://gotvseries.top/')">gotvseries</button>
    <button class="site-btn" onclick="openSite('https://www.cineby.at/')">cineby</button>
    <button class="site-btn" onclick="openSite('https://www.cineplay.to/')">cineplay</button>
    <button class="site-btn" onclick="openSite('https://www.fmovies.nz/')">fmovies</button>
    <button class="site-btn" onclick="openSite('https://lordflix.org/')">lordflix</button>
    <button class="site-btn" onclick="openSite('https://flickystream.su/')">flickystream</button>
    <button class="site-btn" onclick="openSite('https://meowtv.ru/')">meowtv</button>
  </div>

</div>

</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">

  <div class="top-bar">
    <button onclick="openTab()">Open Tab</button>
    <button onclick="openBlank()">Open about:blank</button>
    <button onclick="closeViewer()">Home</button>
  </div>

  <iframe id="frame"></iframe>

  <div class="fallback" id="fallback">
    <h2>Site can’t be embedded</h2>
    <p>Use one of the options above.</p>
  </div>

</div>

<button class="reset" id="resetBtn" onclick="resetAll()">Reset Viewer</button>

<script>

let currentURL = "";

function toggleExtra(){
  const panel = document.getElementById("extraPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function openSite(url){
  currentURL = url;

  document.getElementById("mainUI").style.display = "none";
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("resetBtn").style.display = "block";

  const frame = document.getElementById("frame");
  const fallback = document.getElementById("fallback");

  fallback.style.display = "none";
  frame.style.display = "block";

  frame.src = url;

  // fallback trigger (cannot fully detect iframe block, so timeout)
  setTimeout(() => {
    try {
      if (!frame.contentWindow || frame.contentWindow.location.href === "about:blank") {
        throw new Error();
      }
    } catch {
      fallback.style.display = "block";
      frame.style.display = "none";
    }
  }, 2500);
}

function openTab(){
  window.open(currentURL, "_blank");
}

function openBlank(){
  const w = window.open("about:blank", "_blank");
  w.document.write(`<iframe src="${currentURL}" style="border:none;width:100%;height:100vh"></iframe>`);
}

function closeViewer(){
  window.location.href = window.location.href;
}

function resetAll(){
  document.getElementById("viewer").style.display = "none";
  document.getElementById("mainUI").style.display = "block";
  document.getElementById("resetBtn").style.display = "none";
  document.getElementById("frame").src = "";
  currentURL = "";
}

</script>

</body>
</html>
